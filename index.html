<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexvia Embed</title>

    <style>
        body {
            position: absolute;
            width: 600px;
        }

        iframe {
            height: 100vh;
        }
    </style>
</head>
<body>

    <script>
        // Function to adjust top on interaction
        function adjustTopOnClick() {
            const body = document.body;
            
            // Event listener for the first click
            const handleClick = () => {
                body.style.top = '-31px'; // Adjust the position
                window.removeEventListener('click', handleClick); // Remove listener after the first click
            };
            
            // Add click event listener
            window.addEventListener('click', handleClick);
        }

        // Initialize adjustment on page load
        adjustTopOnClick();

        // Function to inject the embed script
        function loadEmbed() {
            const domain = 'nexvia-photosession'; // Keep your base domain here

            // Create and insert the embed script dynamically
            const script = document.createElement('script');
            script.src = 'https://embed.ycb.me';
            script.async = true;
            script.setAttribute('data-domain', domain);
            script.setAttribute('data-copyparameters', '');
            document.body.appendChild(script);
        }

        // Initial content load
        loadEmbed();
    </script>
</body>
</html>
