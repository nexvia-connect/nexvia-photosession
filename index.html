<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexvia Embed</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden; /* Prevents double scrollbars */
            background-color: transparent;
            display: flex;
            flex-direction: column; /* Stacks the items vertically */
            align-items: center; /* Centers both iframes horizontally */
        }

        /* Weather Iframe */
        .weather-widget {
            width: 100%;
            max-width: 800px;
            height: 100px;
            border: none;
            border-radius: 5px;
            padding: 0px 10px;
            flex-shrink: 0; /* Prevents the weather from squishing */
        }

        /* Booking Iframe */
        #ycb-iframe {
            width: 100%;
            max-width: 800px;
            flex-grow: 1; /* Tells the booking tool to take up all remaining space */
            border: none;
        }
    </style>
</head>
<body>

    <iframe class="weather-widget" src="https://nexvia-connect.github.io/weather/"></iframe>

    <iframe id="ycb-iframe" frameborder="0" allowtransparency="true"></iframe>

    <script>
        const ycbBaseUrl = "https://nexvia-photosession.youcanbook.me/";
        let currentUrl = window.location.href;

        function updateIframe() {
            const urlParams = window.location.search;
            document.getElementById('ycb-iframe').src = ycbBaseUrl + urlParams;
        }

        updateIframe();

        window.addEventListener('popstate', () => {
            if (currentUrl !== window.location.href) {
                currentUrl = window.location.href;
                updateIframe();
            }
        });

        window.addEventListener('hashchange', () => {
            if (currentUrl !== window.location.href) {
                currentUrl = window.location.href;
                updateIframe();
            }
        });

        function checkUrlPeriodically() {
            setInterval(() => {
                if (currentUrl !== window.location.href) {
                    currentUrl = window.location.href;
                    updateIframe(); 
                }
            }, 500);
        }

        checkUrlPeriodically();
    </script>
</body>
</html>
