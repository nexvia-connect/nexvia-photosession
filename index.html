    <iframe id="ycb-iframe" frameborder="0" allowtransparency="true"></iframe>

    <script>
        const ycbBaseUrl = "https://nexvia-photosession.youcanbook.me/";
        let currentUrl = window.location.href;

        function updateIframe() {
            const urlParams = window.location.search;
            const iframe = document.getElementById('ycb-iframe');
            
            // Construct the new source. If no params, just load base URL.
            const newSrc = ycbBaseUrl + urlParams;
            
            // Only update if the source actually changed to prevent flickering
            if (iframe.src !== newSrc) {
                iframe.src = newSrc;
            }
        }

        // --- Weather Logic ---
        function modifyWidget() {
            const widget = document.getElementById('ww_aafa8719d1cd6');
            if (widget) {
                // Hide Temp
                widget.querySelectorAll('.temp').forEach(el => el.style.display = 'none');
                // Fix Margins
                widget.querySelectorAll('.day-forecast svg').forEach(el => el.style.margin = '0');
                // Remove Watermark
                const info = widget.querySelector('.ww_info');
                if (info) info.remove();
            }
        }

        // Initialize everything
        window.onload = () => {
            updateIframe();
            setInterval(modifyWidget, 1000); // Keep widget clean as it loads
        };

        // URL Watcher
        setInterval(() => {
            if (currentUrl !== window.location.href) {
                currentUrl = window.location.href;
                updateIframe(); 
            }
        }, 500);

        window.addEventListener('popstate', updateIframe);
    </script>
