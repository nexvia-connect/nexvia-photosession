<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexvia Embed</title>

    <style>
        /* Fill the Jotform container and center the content */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: transparent;
            display: flex;
            justify-content: center;
        }

        /* Cap the width at 800px so it stays readable */
        iframe {
            width: 100%;
            max-width: 800px;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe id="ycb-iframe" frameborder="0" allowtransparency="true"></iframe>

    <script>
        const ycbBaseUrl = "https://nexvia-photosession.youcanbook.me/";
        let currentUrl = window.location.href;

        // Function to grab the latest URL parameters and push them to the iframe
        function updateIframe() {
            const urlParams = window.location.search;
            document.getElementById('ycb-iframe').src = ycbBaseUrl + urlParams;
        }

        // 1. Initial load
        updateIframe();

        // 2. Listen for history state changes
        window.addEventListener('popstate', () => {
            if (currentUrl !== window.location.href) {
                currentUrl = window.location.href;
                updateIframe();
            }
        });

        // 3. Listen for hash changes
        window.addEventListener('hashchange', () => {
            if (currentUrl !== window.location.href) {
                currentUrl = window.location.href;
                updateIframe();
            }
        });

        // 4. Fallback interval check (Crucial for Jotform widget dynamic updates)
        function checkUrlPeriodically() {
            setInterval(() => {
                if (currentUrl !== window.location.href) {
                    currentUrl = window.location.href;
                    updateIframe(); 
                }
            }, 500); // Checks twice a second to see if Jotform changed the parameters
        }

        checkUrlPeriodically();
    </script>
</body>
</html>
