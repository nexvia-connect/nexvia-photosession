        /* Main Page Layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Inter", 'Open Sans', sans-serif !important;
            overflow: hidden; 
            /* Light gray background to match YCBM's outer background */
            background-color: #f7f7f7; 
            align-items: center;
        }

        /* --- Weather Section (Styled to match YCBM Card) --- */
        #weather-container {
            width: 100%;
            max-width: 800px; /* Matches YCBM width */
            height: 100px;
            margin: 20px auto 10px auto; /* Spacing from top and iframe */
            position: relative;
            flex-shrink: 0;
            
            /* YCBM Card Styling Recreated */
            background-color: #FFFFFF;
            border: 1px solid #e0e0e0; /* Subtle border */
            border-top: 8px solid #303030; /* The thick black top border */
            border-radius: 8px; /* Rounded corners */
            box-shadow: 0px 2px 6px 0px rgba(0,0,0,0.08); /* Soft shadow */
            
            /* Add some padding so the widget doesn't touch the edges */
            padding: 10px 15px; 
            box-sizing: border-box; /* Keeps padding inside the width */
        }

        #ww_aafa8719d1cd6 { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
        }

        /* --- Virtual Buttons Container --- */
        .virtual-button-wrapper {
            position: absolute;
            top: 10px;
            left: 15px; /* Accounts for the container padding */
            right: 15px; /* Accounts for the container padding */
            height: 75px;
            display: flex;
            justify-content: space-around; /* Distributes the 7 buttons evenly */
            align-items: center;
        }

        .virtual-button {
            flex: 1; /* Makes all 7 buttons grow evenly to match the 7 weather columns */
            height: 100%;
            max-width: 65px; /* Keeps the hover box tight around the icon */
            opacity: 0;
            z-index: 10;
            border-radius: 8px;
            margin: 0 2px; /* Tiny gap between hover zones */
            cursor: pointer;
        }
        
        .virtual-button:hover { 
            opacity: 1; 
            box-shadow: 0 0 8px rgba(0,0,0,0.08); 
            z-index: 3000; 
            background-color: rgba(0,0,0,0.03); /* Faint gray hover effect */
        }

        /* --- Booking Section --- */
        #ycb-iframe {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            flex-grow: 1;
            border: none;
            display: block;
            min-height: 500px;
        }
    </style>
</head>

    <iframe id="ycb-iframe" frameborder="0" allowtransparency="true"></iframe>

    <script>
        const ycbBaseUrl = "https://nexvia-photosession.youcanbook.me/";
        let currentUrl = window.location.href;

        // --- Iframe URL Manager ---
        function updateIframe() {
            const urlParams = window.location.search;
            const iframe = document.getElementById('ycb-iframe');
            
            const newSrc = ycbBaseUrl + urlParams;
            
            if (iframe.src !== newSrc) {
                iframe.src = newSrc;
            }
        }

        // --- Weather Logic & Cleanup ---
        function modifyWidget() {
            const widget = document.getElementById('ww_aafa8719d1cd6');
            if (widget) {
                // Hide Temp values
                widget.querySelectorAll('.temp').forEach(el => el.style.display = 'none');
                
                // Force centering on the SVGs to match our flexbox overlay
                widget.querySelectorAll('.day-forecast svg').forEach(el => el.style.margin = '0 auto'); 
                
                // Remove the "Widget weather" watermark/info
                const info = widget.querySelector('.ww_info');
                if (info) info.remove();
            }
        }

        // Initialize everything on load
        window.onload = () => {
            updateIframe();
            // Run the widget cleanup aggressively as it loads
            setInterval(modifyWidget, 500); 
        };

        // Fallback URL Watcher (crucial for dynamic form platforms)
        setInterval(() => {
            if (currentUrl !== window.location.href) {
                currentUrl = window.location.href;
                updateIframe(); 
            }
        }, 500);

        window.addEventListener('popstate', updateIframe);
        window.addEventListener('hashchange', updateIframe);
    </script>
