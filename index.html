<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexvia Embed</title>

    <style>
        /* Reset margins and set full height to avoid collapse */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents double scrollbars */
        }

        /* Target the iframe injected by the YCB script */
        iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }
    </style>
</head>
<body>

    <script>
        // Function to adjust top on interaction
        // NOTE: If the user clicks inside the YouCanBookMe iframe, 
        // this event might not fire due to cross-origin security.
        function adjustTopOnClick() {
            const body = document.body;
            
            const handleClick = () => {
                body.style.transform = 'translateY(-31px)'; // Transform is generally smoother than 'top'
                window.removeEventListener('click', handleClick); 
            };
            
            window.addEventListener('click', handleClick);
        }

        adjustTopOnClick();

        // Function to inject the embed script
        function loadEmbed() {
            const domain = 'nexvia-photosession'; 

            const script = document.createElement('script');
            script.src = 'https://embed.ycb.me';
            script.async = true;
            script.setAttribute('data-domain', domain);
            script.setAttribute('data-copyparameters', '');
            document.body.appendChild(script);
        }

        loadEmbed();
    </script>
</body>
</html>
