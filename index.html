<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexvia Embed</title>

    <style>
        /* Force the body to take up exactly the space Jotform gives it */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh; 
            overflow: hidden; 
            background-color: transparent;
        }

        /* Make the iframe fill the entire screen */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe id="ycb-iframe" frameborder="0" allowtransparency="true"></iframe>

    <script>
        // 1. Grab all the URL parameters that Jotform sent to this GitHub page
        const urlParams = window.location.search;
        
        // 2. Define your base YouCanBook.me URL
        const ycbBaseUrl = "https://nexvia-photosession.youcanbook.me/";

        // 3. Combine them and push them straight into the iframe
        const finalUrl = ycbBaseUrl + urlParams;
        document.getElementById('ycb-iframe').src = finalUrl;
    </script>

</body>
</html>
