<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexvia Embed</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Main Page Layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Open Sans', sans-serif !important;
            overflow: hidden; 
            background-color: transparent;
        }

        /* Weather Section */
        #weather-container {
            width: 100%;
            max-width: 800px;
            height: 100px; /* Locked height */
            margin: 0 auto;
            position: relative;
            flex-shrink: 0; /* Keeps it from squishing */
            padding: 5px 0;
        }

        #ww_aafa8719d1cd6 {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Weather Virtual Buttons */
        .virtual-button {
            margin: 0;
            margin-top: 10px;
            position: absolute;
            top: 0;
            width: calc(16.666% - 6px); 
            height: 70px;
            opacity: 0;
            border-radius: 8px;
            z-index: 10;
        }
        .virtual-button:hover {
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.15);
            opacity: 1;
            z-index: 3000;
        }
        
        .button1 { left: 3px; }
        .button2 { left: calc(16.66% + 3px); }
        .button3 { left: calc(33.32% + 3px); }
        .button4 { left: calc(49.98% + 3px); }
        .button5 { left: calc(66.64% + 3px); }
        .button6 { left: calc(83.3% + 3px); }

        .date {
            color: #999;
            font-size: 11px;
            font-weight: bold;
        }

        /* Booking Section */
        #ycb-iframe {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            flex-grow: 1; /* Fills remaining space */
            border: none;
        }
    </style>
</head>
<body>

    <div id="weather-container">
        <div id="ww_aafa8719d1cd6" v='1.3' loc='id' a='{"t":"responsive","lang":"en","sl_lpl":1,"ids":["wl1775"],"font":"Open+Sans","sl_ics":"one_a","sl_sot":"celsius","cl_bkg":"rgba(255,255,255,1)","cl_font":"rgba(51,51,51,1)","cl_cloud":"rgba(238,238,238,1)","cl_persp":"rgba(31,64,153,0.30500000000000005)","cl_sun":"rgba(252,219,51,1)","cl_moon":"#FFC107","cl_thund":"rgba(252,51,102,1)","cl_odd":"#00000000","el_ctm":3,"el_cwi":3,"el_nme":3}'>
            <a href="https://weatherwidget.org/" id="ww_aafa8719d1cd6_u" target="_blank">Widget weather</a>
        </div>
        <script async src="https://app2.weatherwidget.org/js/?id=ww_aafa8719d1cd6"></script>
        
        <a href="https://www.yr.no/en/forecast/hourly-table/2-2960317/Luxembourg/Luxembourg/Ville%20de%20Luxembourg?i=1" class="virtual-button button1" target="_blank"></a>
        <a href="https://www.yr.no/en/forecast/hourly-table/2-2960317/Luxembourg/Luxembourg/Ville%20de%20Luxembourg?i=2" class="virtual-button button2" target="_blank"></a>
        <a href="https://www.yr.no/en/forecast/hourly-table/2-2960317/Luxembourg/Luxembourg/Ville%20de%20Luxembourg?i=3" class="virtual-button button3" target="_blank"></a>
        <a href="https://www.yr.no/en/forecast/hourly-table/2-2960317/Luxembourg/Luxembourg/Ville%20de%20Luxembourg?i=4" class="virtual-button button4" target="_blank"></a>
        <a href="https://www.yr.no/en/forecast/hourly-table/2-2960317/Luxembourg/Luxembourg/Ville%20de%20Luxembourg?i=5" class="virtual-button button5" target="_blank"></a>
        <a href="https://www.yr.no/en/forecast/hourly-table/2-2960317/Luxembourg/Luxembourg/Ville%20de%20Luxembourg?i=6" class="virtual-button button6" target="_blank"></a>
    </div>

    <iframe id="ycb-iframe" frameborder="0" allowtransparency="true"></iframe>

    <script>
        // --- 1. Weather Widget Modifications ---
        function hideTempDivs() {
            const widgetDiv = document.getElementById('ww_aafa8719d1cd6');
            if (widgetDiv) {
                const tempDivs = widgetDiv.querySelectorAll('.temp');
                tempDivs.length > 0 ? tempDivs.forEach(div => div.style.display = 'none') : setTimeout(hideTempDivs, 500);
            }
        }
    
        function updateSvgMargin() {
            const widgetDiv = document.getElementById('ww_aafa8719d1cd6');
            if (widgetDiv) {
                const dayForecastSvgs = widgetDiv.querySelectorAll('.day-forecast svg');
                dayForecastSvgs.length > 0 ? dayForecastSvgs.forEach(svg => svg.style.margin = '0') : setTimeout(updateSvgMargin, 500);
            }
        }

        function updateDates() {
            const widgetDiv = document.getElementById('ww_aafa8719d1cd6');
            if (widgetDiv) {
                const dateDivs = widgetDiv.querySelectorAll('.date');
                if (dateDivs.length > 0) {
                    const today = new Date();
                    dateDivs.forEach((div, index) => {
                        const currentDate = new Date(today);
                        currentDate.setDate(today.getDate() + index);
                        const options = { weekday: 'short', day: '2-digit', month: '2-digit' };
                        div.innerHTML = currentDate.toLocaleDateString('en-GB', options).replace(/,/g, '');
                    });
                } else { setTimeout(updateDates, 500); }
            }
        }

        function addHoverEffect() {
            const buttons = document.querySelectorAll('.virtual-button');
            const widgetDiv = document.getElementById('ww_aafa8719d1cd6');
            
            buttons.forEach((button, index) => {
                button.addEventListener('mouseover', () => {
                    const dates = widgetDiv.querySelectorAll('.date');
                    const data = widgetDiv.querySelectorAll('.data');
                    const adjIndex = index + 1;
                    if (dates[adjIndex]) {
                        dates[adjIndex].style.color = '#666';
                        data[adjIndex].style.transition = 'transform 0.5s ease';
                        data[adjIndex].style.transform = 'scale(1.35)';
                    }
                });
                button.addEventListener('mouseout', () => {
                    const dates = widgetDiv.querySelectorAll('.date');
                    const data = widgetDiv.querySelectorAll('.data');
                    const adjIndex = index + 1;
                    if (dates[adjIndex]) {
                        dates[adjIndex].style.color = '#999';
                        data[adjIndex].style.transition = 'transform 0.3s ease';
                        data[adjIndex].style.transform = 'scale(1)';
                    }
                });
            });
        }

        function removeSpecificElement() {
            const widgetDiv = document.getElementById('ww_aafa8719d1cd6');
            if (widgetDiv) {
                const specificElement = widgetDiv.querySelector('div.ww-box > div.ww_col2 > div:nth-child(25)');
                if (specificElement) specificElement.remove();
                const infoElement = widgetDiv.querySelector('div.ww_info');
                if (infoElement) infoElement.remove();
            } else { setTimeout(removeSpecificElement, 500); }
        }

        // --- 2. Booking Iframe URL Management ---
        const ycbBaseUrl = "https://nexvia-photosession.youcanbook.me/";
        let currentUrl = window.location.href;

        function updateIframe() {
            const urlParams = window.location.search;
            document.getElementById('ycb-iframe').src = ycbBaseUrl + urlParams;
        }

        function checkUrlPeriodically() {
            setInterval(() => {
                if (currentUrl !== window.location.href) {
                    currentUrl = window.location.href;
                    updateIframe(); 
                }
            }, 500);
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', function() {
            updateIframe();
            checkUrlPeriodically();
            setTimeout(() => {
                hideTempDivs();
                updateSvgMargin();
                updateDates();
                addHoverEffect();
                removeSpecificElement();
            }, 600);
        });

        window.addEventListener('popstate', updateIframe);
        window.addEventListener('hashchange', updateIframe);
    </script>
</body>
</html>
